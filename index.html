<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华泰财富研究大消费路演主题</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F5F5F5;
            color: #1A1A1A;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            padding: 24px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1A1A1A;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 14px;
            color: #6B7280;
            font-weight: 400;
        }

        /* Filters */
        .filters {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            font-weight: 500;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #E5E7EB;
            background-color: #FFFFFF;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #6B7280;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: #3B82F6;
            color: #3B82F6;
            background-color: #EFF6FF;
        }

        .filter-btn.active {
            background-color: #3B82F6;
            border-color: #3B82F6;
            color: #FFFFFF;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 24px;
            padding: 20px 0;
            border-top: 1px solid #E5E7EB;
            margin-top: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #3B82F6;
        }

        .stat-label {
            font-size: 13px;
            color: #6B7280;
        }

        /* Main Content */
        main {
            padding: 32px 0;
        }

        .results-info {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 20px;
            padding: 12px 16px;
            background-color: #FFFFFF;
            border-radius: 8px;
            border: 1px solid #E5E7EB;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Card */
        .card {
            background-color: #FFFFFF;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            padding: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card:hover {
            border-color: #3B82F6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-category {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-type {
            background-color: #EFF6FF;
            color: #3B82F6;
        }

        .tag-subtype {
            background-color: #F0FDF4;
            color: #059669;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #F3F4F6;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 14px;
        }

        .meta-label {
            color: #6B7280;
            min-width: 70px;
            flex-shrink: 0;
        }

        .meta-value {
            color: #1A1A1A;
            font-weight: 500;
        }

        .speakers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .speaker-badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: #F3F4F6;
            border-radius: 12px;
            font-size: 13px;
            color: #1A1A1A;
            font-weight: 500;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background-color: #FFFFFF;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
        }

        .no-results-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .no-results-text {
            font-size: 16px;
            color: #6B7280;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E7EB;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            h1 {
                font-size: 20px;
            }

            .stats {
                gap: 16px;
            }

            .stat-value {
                font-size: 24px;
            }

            .card {
                padding: 16px;
            }

            .card-title {
                font-size: 15px;
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>华泰财富研究大消费路演主题</h1>
                    <p class="subtitle">2026年4月可选主题 · <span id="totalCount">0</span>个主题</p>
                </div>
                
                <div class="filters">
                    <div class="filter-group">
                        <div class="filter-label">类型</div>
                        <div class="filter-buttons" id="typeFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-label">二级类型</div>
                        <div class="filter-buttons" id="subtypeFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-label">演讲人</div>
                        <div class="filter-buttons" id="speakerFilters"></div>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="filteredCount">0</div>
                        <div class="stat-label">当前主题数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="typeCount">0</div>
                        <div class="stat-label">类型数量</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="speakerCount">0</div>
                        <div class="stat-label">演讲人数</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="results-info" id="resultsInfo">
                显示全部 <strong>0</strong> 个主题
            </div>
            
            <div class="cards-grid" id="cardsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 全局变量
        let allData = [];
        let filteredData = [];
        let activeFilters = {
            type: null,
            subtype: null,
            speaker: null
        };

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                allData = await response.json();
                filteredData = [...allData];
                initializeFilters();
                renderCards();
                updateStats();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('cardsGrid').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">⚠️</div>
                        <div class="no-results-text">数据加载失败，请刷新页面重试</div>
                    </div>
                `;
            }
        }

        // 初始化筛选器
        function initializeFilters() {
            // 获取所有类型
            const types = [...new Set(allData.map(item => item['类型']))].sort();
            renderFilterButtons('typeFilters', types, 'type');

            // 获取所有二级类型
            const subtypes = [...new Set(allData.map(item => item['二级类型']))].sort();
            renderFilterButtons('subtypeFilters', subtypes, 'subtype');

            // 获取所有演讲人（拆分多个演讲人）
            const speakersSet = new Set();
            allData.forEach(item => {
                const speakers = item['演讲人'].split('/').map(s => s.trim());
                speakers.forEach(speaker => speakersSet.add(speaker));
            });
            const speakers = [...speakersSet].sort();
            renderFilterButtons('speakerFilters', speakers, 'speaker');
        }

        // 渲染筛选按钮
        function renderFilterButtons(containerId, items, filterType) {
            const container = document.getElementById(containerId);
            
            // 添加"全部"按钮
            let html = `<button class="filter-btn active" onclick="handleFilter('${filterType}', null)">全部</button>`;
            
            // 添加其他按钮
            items.forEach(item => {
                html += `<button class="filter-btn" onclick="handleFilter('${filterType}', '${item}')">${item}</button>`;
            });
            
            container.innerHTML = html;
        }

        // 处理筛选
        function handleFilter(filterType, value) {
            activeFilters[filterType] = value;
            
            // 更新按钮状态
            const containerId = filterType + 'Filters';
            const buttons = document.getElementById(containerId).getElementsByClassName('filter-btn');
            Array.from(buttons).forEach(btn => {
                btn.classList.remove('active');
                if ((value === null && btn.textContent === '全部') || btn.textContent === value) {
                    btn.classList.add('active');
                }
            });

            // 应用筛选
            applyFilters();
        }

        // 应用所有筛选
        function applyFilters() {
            filteredData = allData.filter(item => {
                // 类型筛选
                if (activeFilters.type && item['类型'] !== activeFilters.type) {
                    return false;
                }
                
                // 二级类型筛选
                if (activeFilters.subtype && item['二级类型'] !== activeFilters.subtype) {
                    return false;
                }
                
                // 演讲人筛选
                if (activeFilters.speaker) {
                    const speakers = item['演讲人'].split('/').map(s => s.trim());
                    if (!speakers.includes(activeFilters.speaker)) {
                        return false;
                    }
                }
                
                return true;
            });

            renderCards();
            updateStats();
        }

        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('cardsGrid');
            
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">没有找到匹配的主题</div>
                        <p style="color: #9CA3AF; font-size: 14px; margin-top: 8px;">请尝试调整筛选条件</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredData.forEach(item => {
                const speakers = item['演讲人'].split('/').map(s => s.trim());
                const speakerBadges = speakers.map(s => 
                    `<span class="speaker-badge">${s}</span>`
                ).join('');

                html += `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-category">
                                <span class="tag tag-type">${item['类型']}</span>
                                <span class="tag tag-subtype">${item['二级类型']}</span>
                            </div>
                            <h3 class="card-title">${item['路演主题'].trim()}</h3>
                        </div>
                        <div class="card-body">
                            <div class="card-meta">
                                <div class="meta-item">
                                    <span class="meta-label">演讲人</span>
                                    <div class="speakers">${speakerBadges}</div>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">投资视角</span>
                                    <span class="meta-value">${item['投资视角']}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 更新统计
        function updateStats() {
            // 更新总数
            document.getElementById('totalCount').textContent = allData.length;
            
            // 更新筛选后的数量
            document.getElementById('filteredCount').textContent = filteredData.length;
            
            // 更新类型数量
            const types = new Set(filteredData.map(item => item['类型']));
            document.getElementById('typeCount').textContent = types.size;
            
            // 更新演讲人数量
            const speakersSet = new Set();
            filteredData.forEach(item => {
                const speakers = item['演讲人'].split('/').map(s => s.trim());
                speakers.forEach(speaker => speakersSet.add(speaker));
            });
            document.getElementById('speakerCount').textContent = speakersSet.size;
            
            // 更新结果信息
            const resultsInfo = document.getElementById('resultsInfo');
            if (activeFilters.type || activeFilters.subtype || activeFilters.speaker) {
                let filters = [];
                if (activeFilters.type) filters.push(`类型: ${activeFilters.type}`);
                if (activeFilters.subtype) filters.push(`二级类型: ${activeFilters.subtype}`);
                if (activeFilters.speaker) filters.push(`演讲人: ${activeFilters.speaker}`);
                resultsInfo.innerHTML = `找到 <strong>${filteredData.length}</strong> 个主题 · 筛选条件: ${filters.join(' / ')}`;
            } else {
                resultsInfo.innerHTML = `显示全部 <strong>${filteredData.length}</strong> 个主题`;
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
